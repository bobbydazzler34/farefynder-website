<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact FareFynder for product questions and assistance."
    />
    <title>FareFynder Support</title>
    <style>
      :root {
        --bg: #191414;
        --text: #ffffff;
        --muted: #b3b3b3;
        --primary: #1db954;
        --primary-hover: #1ed760;
        --border: #404040;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        line-height: 1.5;
        color: var(--text);
        background: radial-gradient(
          circle at top,
          #282828 0%,
          #191414 55%,
          #121212 100%
        );
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 42rem;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 3rem;
      }
      .badge {
        display: inline-block;
        margin: 0 0 1rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: color-mix(in srgb, var(--primary) 20%, transparent);
        color: var(--primary-hover);
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        line-height: 1.2;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .cta {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.7rem;
        background: var(--primary);
        color: #121212;
        font-weight: 700;
        text-decoration: none;
        transition:
          background 0.15s ease,
          transform 0.12s ease;
      }
      .cta:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .back {
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
      }
      .back a {
        color: var(--text);
        text-decoration: none;
      }
      .back a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="badge">FareFynder</p>
      <h1>FareFynder Support</h1>
      <p>
        If you have questions about FareFynder or need assistance, contact us by
        email. We aim to respond as soon as we can.
      </p>
      <p>
        <a class="cta" href="mailto:support@farefynder.com">Email support</a>
      </p>
      <p>
        For written correspondence, reach us at
        <a href="mailto:support@farefynder.com">support@farefynder.com</a>.
      </p>
      <nav class="back" aria-label="Site">
        <a href="/">← Back to FareFynder</a>
      </nav>
    </main>
  </body>
</html>
